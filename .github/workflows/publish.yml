name: Publish to npm

# Publishes when a GitHub Release is published (tag the release with the version,
# e.g. v0.1.0). Can also be run manually from the Actions tab.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build and test
        run: npm test
      - name: Publish
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
